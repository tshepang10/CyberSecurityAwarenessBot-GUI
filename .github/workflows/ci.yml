name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CyberSecurityAwarenessBot/CyberSecurityAwarenessBot.csproj

      - name: Build
        run: dotnet build CyberSecurityAwarenessBot/CyberSecurityAwarenessBot.csproj --configuration Release --no-restore

      - name: Test project structure
        shell: pwsh
        run: |
          if (-not (Test-Path "CyberSecurityAwarenessBot/Assets/greetings.wav")) { throw "Missing greetings.wav" }
          if (-not (Test-Path "CyberSecurityAwarenessBot/appsettings.json")) { throw "Missing appsettings.json" }
